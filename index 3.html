<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f4faf4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;max-width:600px;margin:0 auto}
::-webkit-scrollbar{display:none}
input,textarea,select{background:#ffffff;border:1.5px solid #d0e8d0;color:#1a2e1a;font-family:inherit;font-size:16px;border-radius:12px;padding:12px 14px;outline:none;width:100%;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:#3da63d;box-shadow:0 0 0 3px #e8f5e8}
input::placeholder,textarea::placeholder{color:#8aaa8a}
select option{background:#ffffff}
button{cursor:pointer;font-family:inherit;border:none;background:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.75}
a{color:#3da63d;text-decoration:none}
.screen{display:flex;flex-direction:column;flex:1;overflow:hidden}
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);background:#ffffff;border-bottom:1px solid #d0e8d0;flex-shrink:0}
.hdr-logo{height:30px;width:auto}
.hdr-title{font-weight:800;font-size:17px;color:#1a2e1a}
/* Bottom nav */
.nav{display:flex;background:#ffffff;border-top:1px solid #d0e8d0;padding-bottom:env(safe-area-inset-bottom,8px);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 5px;gap:2px;position:relative}
.nav-btn .ico{font-size:20px;position:relative}
.nav-btn .lbl{font-size:9px;color:#8aaa8a;font-weight:500}
.nav-btn.active .lbl{color:#3da63d;font-weight:700}
.nav-btn.active::after{content:'';position:absolute;bottom:0;width:28px;height:2.5px;background:#3da63d;border-radius:99px}
.badge{position:absolute;top:-4px;right:-10px;background:#e05555;color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center}
/* Cards */
.card{background:#ffffff;border:1px solid #d0e8d0;border-radius:16px;box-shadow:0 1px 4px rgba(61,166,61,.07)}
/* Sheet overlay */
.overlay{position:fixed;inset:0;background:rgba(10,40,10,.4);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(2px)}
.sheet{background:#ffffff;border-radius:24px 24px 0 0;max-height:92dvh;display:flex;flex-direction:column;border-top:1px solid #d0e8d0;padding-bottom:env(safe-area-inset-bottom,0px)}
.sheet-handle{width:40px;height:4px;background:#d0e8d0;border-radius:99px;margin:12px auto 8px}
.sheet-body{overflow-y:auto;flex:1;padding:0 0 24px;-webkit-overflow-scrolling:touch}
/* Buttons */
.btn-primary{background:#3da63d;color:#fff;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;width:100%;box-shadow:0 2px 8px rgba(61,166,61,.25)}
.btn-primary:disabled{background:#8aaa8a;box-shadow:none;opacity:.6}
.btn-sec{background:#e8f5e8;border:1px solid #3da63d33;color:#2d862d;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700}
.btn-ghost{background:#f0f7f0;border:1px solid #d0e8d0;color:#4a7a4a;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700}
.btn-danger{background:#fff5f5;border:1px solid #e0555544;color:#e05555;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700}
/* Pills */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-green{background:#e8f5e8;color:#2d862d;border:1px solid #3da63d44}
.pill-blue{background:#e8f2ff;color:#1a60a0;border:1px solid #2a7ab044}
.pill-gray{background:#f0f7f0;color:#4a7a4a;border:1px solid #d0e8d0}
.pill-red{background:#fff5f5;color:#e05555;border:1px solid #e0555544}
.pill-yellow{background:#fff8e8;color:#c87800;border:1px solid #c8780044}
/* Form label */
.fl{font-size:12px;color:#4a7a4a;font-weight:600;margin-bottom:5px;padding-left:2px;display:block}
/* Separator */
.sep{height:1px;background:#d0e8d0}
/* Row */
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #d0e8d0}
/* Avatar */
.av{border-radius:38%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;background:#e8f5e8;color:#2d862d}
/* Fade in */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-in{animation:fadeIn .15s ease both}
.slide-up{animation:slideUp .25s cubic-bezier(.25,.8,.25,1) both}
/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 24px;text-align:center;flex:1}
.empty img{width:110px;opacity:.25}
.empty p{color:#4a7a4a;font-size:14px}
/* Filter pills */
.filters{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;flex-shrink:0}
.filt{padding:7px 14px;border-radius:99px;border:1.5px solid #d0e8d0;background:#ffffff;color:#4a7a4a;font-size:12px;font-weight:500;white-space:nowrap}
.filt.active{border-color:#3da63d;background:#e8f5e8;color:#2d862d;font-weight:700}
/* Stat cards strip */
.stats{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;flex-shrink:0}
.stat{border-radius:12px;padding:9px 14px;display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;min-width:70px}
.stat .val{font-weight:800;font-size:22px;line-height:1}
.stat .lbl{font-size:9px;font-weight:600;opacity:.7}
/* Search */
.search-wrap{padding:0 16px 8px;flex-shrink:0;position:relative}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-wrap input{padding-left:42px}
/* KPI */
.kpi-card{background:#ffffff;border:1px solid #d0e8d0;border-radius:14px;padding:14px;margin-bottom:10px}
.kpi-label{font-size:10px;color:#4a7a4a;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
/* Checkbox */
.chk{width:22px;height:22px;border-radius:99px;border:2px solid #d0e8d0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff;font-weight:800}
.chk.on{background:#3da63d;border-color:#3da63d}
/* Type toggle */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:13px;border-radius:12px;border:1.5px solid #d0e8d0;background:#ffffff;color:#4a7a4a;font-size:15px;font-weight:500;text-transform:capitalize}
.type-btn.active{border-color:#3da63d;background:#e8f5e8;color:#2d862d;font-weight:700}
</style>
</head>
<body>

const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(v!==null&&v!==undefined&&v!==false) el.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)) {
    if(c===null||c===undefined||c===false) continue;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  }
  return el;
};

let sheetStack = [];

const openSheet = (renderFn) => {
  sheetStack.push(renderFn);
  renderSheet();
};

const closeSheet = () => {
  sheetStack.pop();
  renderSheet();
};

const closeAllSheets = () => {
  sheetStack = [];
  renderSheet();
};

const renderSheet = () => {
  let container = $('#sheet-container');
  if(!container) {
    container = h('div',{id:'sheet-container'});
    document.getElementById('app').appendChild(container);
  }
  container.innerHTML = '';
  if(!sheetStack.length) return;

  const fn = sheetStack[sheetStack.length-1];
  const overlay = h('div',{class:'overlay fade-in', onClick:(e)=>{if(e.target===overlay)closeSheet();}});
  const sheet = h('div',{class:'sheet slide-up'});
  const handle = h('div',{class:'sheet-handle'});
  const body = h('div',{class:'sheet-body'});
  sheet.appendChild(handle);
  sheet.appendChild(body);
  overlay.appendChild(sheet);
  container.appendChild(overlay);
  fn(body);
};

const sheetTitle = (text) => h('div',{style:{textAlign:'center',padding:'0 16px 12px',fontWeight:700,fontSize:17,color:'#1a2e1a'}}, [text]);

const formGroup = (label, input) => {
  const wrap = h('div',{});
  wrap.appendChild(h('label',{class:'fl'},[label]));
  wrap.appendChild(input);
  return wrap;
};

const renderDash = (container) => {
  const CYCLE=30;
  const tf = state.dashFilter;
  const contacts = tf==='todos' ? state.contacts : state.contacts.filter(c=>c.type===tf);

  const rows = contacts.map(c=>{
    const fl=state.elog[c.id];
    const cl=state.camps.filter(cp=>cp.cIds?.includes(c.id)&&cp.lastSent).map(cp=>cp.lastSent).sort().at(-1);
    const ls=[fl,cl].filter(Boolean).sort().at(-1)||null;
    const ago=ls?dAgo(ls):null;
    const rem=ago!==null?CYCLE-ago:null;
    const st=!ls?'nunca':ago>=CYCLE?'vencido':ago>=CYCLE-5?'pronto':'ok';
    const camp=state.camps.find(cp=>cp.cIds?.includes(c.id)&&cp.status==='activa');
    return{c,ls,ago,rem,st,camp};
  });

  const ov=rows.filter(r=>r.st==='vencido'||r.st==='nunca');
  const pr=rows.filter(r=>r.st==='pronto');
  const ok=rows.filter(r=>r.st==='ok');

  const SC={
    nunca:{color:'#e05555',icon:'⭕',tx:r=>'Sin envíos'},
    vencido:{color:'#e05555',icon:'🔴',tx:r=>`Vencido — hace ${r.ago}d`},
    pronto:{color:'#c87800',icon:'🟡',tx:r=>`Enviar en ${r.rem}d`},
    ok:{color:'#3da63d',icon:'🟢',tx:r=>`Al día — ${r.rem}d`},
  };

  const ring = (pct,color,sz=46) => {
    const R=(sz-8)/2,ci=2*Math.PI*R,da=ci*Math.min(Math.max(pct,0),1);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',sz);svg.setAttribute('height',sz);
    svg.style.transform='rotate(-90deg)';svg.style.flexShrink='0';
    const mk=(r,stroke,sw,dash='')=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',sz/2);c.setAttribute('cy',sz/2);c.setAttribute('r',R);c.setAttribute('fill','none');c.setAttribute('stroke',stroke);c.setAttribute('stroke-width',sw);if(dash)c.setAttribute('stroke-dasharray',dash);c.setAttribute('stroke-linecap','round');return c;};
    svg.appendChild(mk(R,'#d0e8d0',5));
    svg.appendChild(mk(R,color,5,`${da} ${ci}`));
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',sz/2);t.setAttribute('y',sz/2);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');t.setAttribute('fill',color);t.setAttribute('font-size','10');t.setAttribute('font-weight','800');
    t.style.transform=`rotate(90deg)`;t.style.transformOrigin=`${sz/2}px ${sz/2}px`;
    t.textContent=pct>=1?'!':Math.round(pct*100)+'%';
    svg.appendChild(t);
    return svg;
  };

  const makeRow = (r) => {
    const s=SC[r.st];
    const mailBtn = h('button',{
      style:{width:'36px',height:'36px',borderRadius:'10px',fontSize:'17px',display:'flex',alignItems:'center',justifyContent:'center',background:r.camp?'#3da63d':'#f0f7f0',border:r.camp?'none':'1px solid #d0e8d0',flexShrink:'0'},
      onClick:()=>{
        if(r.camp) openEmailComposer(r.camp, r.c);
        else { state.tab='camps'; render(); }
      }
    }, [r.camp?'✉️':'+']);

    const statusEl = h('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginTop:'3px'}}, [
      h('span',{style:{fontSize:'10px'}}, [s.icon]),
      h('span',{style:{fontSize:'10px',color:s.color,fontWeight:'600'}}, [s.tx(r)])
    ]);

    return h('div',{class:'row'}, [
      avatar(r.c.name, 40, r.c.type==='cliente'),
      h('div',{style:{flex:'1',minWidth:'0'}}, [
        h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'2px'}}, [
          h('span',{style:{color:'#1a2e1a',fontWeight:'600',fontSize:'14px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, [r.c.name]),
          h('span',{style:{color:'#8aaa8a',fontSize:'9px',fontWeight:'700',flexShrink:'0',fontFamily:'monospace'}}, [r.c.clientId])
        ]),
        h('div',{style:{color:'#4a7a4a',fontSize:'11px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, [r.c.company||r.c.email]),
        statusEl
      ]),
      h('div',{style:{display:'flex',alignItems:'center',gap:'7px',flexShrink:'0'}}, [
        ring(r.ago!==null?r.ago/CYCLE:1, s.color),
        mailBtn
      ])
    ]);
  };

  const section = (title, items, color) => {
    if(!items.length) return null;
    const card = h('div',{class:'card',style:{margin:'0 16px',overflow:'hidden'}});
    items.forEach(r=>card.appendChild(makeRow(r)));
    return h('div',{style:{marginBottom:'14px'}}, [
      h('div',{style:{display:'flex',alignItems:'center',gap:'7px',padding:'0 18px 8px'}}, [
        h('span',{style:{fontWeight:'700',fontSize:'12px',color}}, [title]),
        h('span',{style:{background:color+'18',color,border:`1px solid ${color}33`,borderRadius:'99px',padding:'1px 8px',fontSize:'11px',fontWeight:'700'}}, [String(items.length)])
      ]),
      card
    ]);
  };

  // Header
  const hdr = h('div',{class:'hdr'}, [
    h('img',{src:LOGO,class:'hdr-logo'}),
    h('span',{style:{fontSize:'11px',color:'#8aaa8a',fontWeight:'600'}}, ['Ciclo: 30 días'])
  ]);

  // Filters
  const filters = h('div',{class:'filters'});
  [['prospecto','Prospectos'],['cliente','Clientes'],['todos','Todos']].forEach(([id,l])=>{
    const btn=h('button',{class:`filt${tf===id?' active':''}`,onClick:()=>{state.dashFilter=id;render();}},[l]);
    filters.appendChild(btn);
  });

  // Stats
  const statsEl=h('div',{class:'stats'});
  [
    {l:'Vencidos',v:ov.length,bg:'#fff5f5',c:'#e05555'},
    {l:'Esta sem.',v:pr.length,bg:'#fff8e8',c:'#c87800'},
    {l:'Al día',v:ok.length,bg:'#e8f5e8',c:'#2d862d'},
    {l:'Total',v:contacts.length,bg:'#f0f7f0',c:'#4a7a4a'},
  ].forEach(s=>{
    const d=h('div',{class:'stat',style:{background:s.bg,border:`1px solid ${s.c}22`}});
    d.appendChild(h('span',{class:'val',style:{color:s.c}},[String(s.v)]));
    d.appendChild(h('span',{class:'lbl',style:{color:s.c}},[s.l]));
    statsEl.appendChild(d);
  });

  // List
  const list=h('div',{class:'scroll'});
  if(!state.contacts.length) {
    const emp=h('div',{class:'empty'});
    emp.appendChild(h('img',{src:LOGO}));
    emp.appendChild(h('p',{},'Agrega contactos para ver el seguimiento'));
    emp.appendChild(h('button',{class:'btn-primary',style:{marginTop:'8px'},onClick:()=>{state.tab='contacts';render();}},'Ir a Contactos'));
    list.appendChild(emp);
  } else if(!contacts.length) {
    list.appendChild(h('div',{style:{padding:'32px',textAlign:'center',color:'#4a7a4a'}},`Sin ${tf}s.`));
  } else {
    [['🔴 Acción urgente',ov,'#e05555'],['🟡 Esta semana',pr,'#c87800'],['🟢 Al día',ok,'#3da63d']].forEach(([t,items,c])=>{
      const s=section(t,items,c);
      if(s) list.appendChild(s);
    });
    list.appendChild(h('div',{style:{height:'16px'}}));
  }

  container.appendChild(hdr);
  container.appendChild(filters);
  container.appendChild(statsEl);
  container.appendChild(list);
};

const openCampWizard = () => {
  let step=1;
  const f={name:'',subject:DEF_SUBJ,body:DEF_BODY.replace(/{{{/g,'{').replace(/}}}/g,'}'),freq:30,ft:'todos',cIds:[]};

  const wizard = (body) => {
    body.innerHTML='';
    const prog=h('div',{style:{display:'flex',gap:'5px',padding:'4px 16px 14px'}});
    [1,2].forEach(s=>prog.appendChild(h('div',{style:{flex:'1',height:'3px',borderRadius:'99px',background:step>=s?'#3da63d':'#d0e8d0',transition:'background .25s'}})));
    body.appendChild(h('div',{style:{textAlign:'center',padding:'0 16px 12px',fontWeight:'700',fontSize:'17px',color:'#1a2e1a'}},`Nueva campaña ${step}/2`));
    body.appendChild(prog);

    const p=h('div',{style:{padding:'0 16px',display:'flex',flexDirection:'column',gap:'12px'}});

    if(step===1){
      const nameI=h('input',{type:'text',placeholder:'Ej: Seguimiento prospectos',value:f.name});nameI.addEventListener('input',e=>f.name=e.target.value);
      
      const freqWrap=h('div',{style:{display:'flex',gap:'7px',flexWrap:'wrap'}});
      FREQS.forEach(fr=>{const btn=h('button',{class:`filt${f.freq===fr.d?' active':''}`,onClick:()=>{f.freq=fr.d;freqWrap.querySelectorAll('.filt').forEach(b=>{b.className='filt'+(b.textContent===fr.l?' active':'');});}},fr.l);freqWrap.appendChild(btn);});
      
      const subjI=h('input',{type:'text',value:f.subject});subjI.addEventListener('input',e=>f.subject=e.target.value);
      const bodyTA=h('textarea',{style:{height:'160px',resize:'none',fontSize:'13px'}},f.body);bodyTA.addEventListener('input',e=>f.body=e.target.value);
      
      [formGroup('Nombre *',nameI),formGroup('Frecuencia',freqWrap),formGroup('Asunto *',subjI),formGroup('Cuerpo ({{nombre}} {{empresa}} {{firma}})',bodyTA)].forEach(el=>p.appendChild(el));
      p.appendChild(h('button',{class:'btn-primary',onClick:()=>{if(!f.name||!f.subject)return;step=2;wizard(body);}}, 'Siguiente →'));
    } else {
      const ftWrap=h('div',{class:'type-grid'});
      ['todos','prospecto','cliente'].forEach(t=>{
        const btn=h('button',{class:`type-btn${f.ft===t?' active':''}`,style:{textTransform:'capitalize'},onClick:()=>{f.ft=t;f.cIds=[];ftWrap.querySelectorAll('.type-btn').forEach(b=>{b.className='type-btn'+(b.textContent.trim()===t?' active':'');});renderList();}},t);
        ftWrap.appendChild(btn);
      });
      p.appendChild(formGroup('Tipo de contacto',ftWrap));

      const elig=()=>f.ft==='todos'?state.contacts:state.contacts.filter(c=>c.type===f.ft);
      const selCount=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
      const selLabel=h('span',{style:{color:'#4a7a4a',fontSize:'13px'}});
      const allBtn=h('button',{class:'btn-ghost',style:{padding:'6px 12px',fontSize:'12px'}});
      selCount.appendChild(selLabel);selCount.appendChild(allBtn);
      p.appendChild(selCount);

      const listCard=h('div',{class:'card',style:{maxHeight:'260px',overflowY:'auto'}});
      p.appendChild(listCard);

      const renderList=()=>{
        const el=elig();
        selLabel.textContent=`${el.length} disponibles · ${f.cIds.length} sel.`;
        const allSel=el.length>0&&el.every(c=>f.cIds.includes(c.id));
        allBtn.textContent=allSel?'Ninguno':'Todos';
        allBtn.onclick=()=>{f.cIds=allSel?[]:el.map(c=>c.id);renderList();};
        listCard.innerHTML='';
        el.forEach((c,i)=>{
          const on=f.cIds.includes(c.id);
          const row=h('div',{style:{display:'flex',alignItems:'center',gap:'11px',padding:'12px 13px',borderBottom:i<el.length-1?'1px solid #d0e8d0':'none',background:on?'#e8f5e8':'transparent',cursor:'pointer'},onClick:()=>{f.cIds=on?f.cIds.filter(x=>x!==c.id):[...f.cIds,c.id];renderList();}});
          const chk=h('div',{class:`chk${on?' on':''}`},on?['✓']:[]);
          row.appendChild(chk);
          row.appendChild(h('div',{style:{flex:'1',minWidth:'0'}},[ h('div',{style:{color:'#1a2e1a',fontSize:'13px',fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.name), h('div',{style:{color:'#4a7a4a',fontSize:'11px'}},c.company||c.email) ]));
          row.appendChild(typePill(c.type));
          listCard.appendChild(row);
        });
      };
      renderList();

      const btnRow=h('div',{style:{display:'flex',gap:'9px'}});
      btnRow.appendChild(h('button',{class:'btn-ghost',style:{flex:'1'},onClick:()=>{step=1;wizard(body);}},'← Atrás'));
      btnRow.appendChild(h('button',{class:'btn-primary',style:{flex:'2'},onClick:()=>{
        if(!f.cIds.length)return;
        state.camps=[{id:uid(),name:f.name,subject:f.subject,body:f.body,freq:f.freq,cIds:f.cIds,createdAt:new Date().toISOString(),nextSend:addDN(f.freq),lastSent:null,status:'activa',sentCount:0},...state.camps];
        save();closeSheet();render();
      }},`Crear (${f.cIds.length})`));
      p.appendChild(btnRow);
    }
    body.appendChild(p);
  };

  openSheet(wizard);
};

const renderKPI = (container) => {
  const hdr=h('div',{class:'hdr'},[ h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},[ h('img',{src:LOGO,style:{height:'26px',width:'auto'}}), h('span',{class:'hdr-title'},'KPI & Analítica') ]) ]);

  const months=[];const n=new Date();
  for(let i=5;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);months.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,l:MONTHS[d.getMonth()]});}

  const y=thisYear();
  const tc=state.contacts.length,cl=state.contacts.filter(c=>c.type==='cliente').length;
  const cc=tc>0?(cl/tc)*100:0;
  const sQ=state.quotes.filter(q=>['enviada','aceptada','facturada'].includes(q.status));
  const aQ=state.quotes.filter(q=>['aceptada','facturada'].includes(q.status));
  const sv=sQ.reduce((s,q)=>s+q.total,0),av=aQ.reduce((s,q)=>s+q.total,0);
  const cf=sv>0?(av/sv)*100:0;
  const fR=state.quotes.filter(q=>q.invoice).reduce((s,q)=>s+(parseFloat(q.invoice?.amount)||0),0);

  const donut=(pct,color,label,sz=82)=>{
    const R=sz/2-9,ci=2*Math.PI*R,da=ci*Math.min(Math.max(pct/100,0),1);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',sz);svg.setAttribute('height',sz);svg.style.flexShrink='0';
    const mkC=(stroke,sw,dash='')=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',sz/2);c.setAttribute('cy',sz/2);c.setAttribute('r',R);c.setAttribute('fill','none');c.setAttribute('stroke',stroke);c.setAttribute('stroke-width',sw);if(dash)c.setAttribute('stroke-dasharray',dash);c.setAttribute('stroke-linecap','round');c.setAttribute('transform',`rotate(-90 ${sz/2} ${sz/2})`);return c;};
    svg.appendChild(mkC('#d0e8d0',9));svg.appendChild(mkC(color,9,`${da} ${ci}`));
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',sz/2);t.setAttribute('y',String(sz/2-4));t.setAttribute('text-anchor','middle');t.setAttribute('font-size','13');t.setAttribute('font-weight','800');t.setAttribute('fill',color);t.textContent=Math.round(pct)+'%';svg.appendChild(t);
    if(label){const tl=document.createElementNS('http://www.w3.org/2000/svg','text');tl.setAttribute('x',sz/2);tl.setAttribute('y',String(sz/2+10));tl.setAttribute('text-anchor','middle');tl.setAttribute('font-size','6.5');tl.setAttribute('fill','#8aaa8a');tl.textContent=label;svg.appendChild(tl);}
    return svg;
  };

  const bar=(data,color,h0=70)=>{
    const max=Math.max(...data.map(d=>d.v),1);const bw=100/data.length;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('width','100%');svg.setAttribute('viewBox',`0 0 100 ${h0+16}`);svg.setAttribute('preserveAspectRatio','none');svg.style.overflow='visible';svg.style.display='block';
    data.forEach((d,i)=>{
      const bh=(d.v/max)*h0;const x=i*bw+bw*.15;const w=bw*.7;
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');rect.setAttribute('x',x);rect.setAttribute('y',h0-bh);rect.setAttribute('width',w);rect.setAttribute('height',Math.max(bh,.5));rect.setAttribute('fill',color);rect.setAttribute('rx','1.5');rect.setAttribute('opacity','.85');svg.appendChild(rect);
      const tl=document.createElementNS('http://www.w3.org/2000/svg','text');tl.setAttribute('x',x+w/2);tl.setAttribute('y',h0+12);tl.setAttribute('text-anchor','middle');tl.setAttribute('font-size','6');tl.setAttribute('fill','#8aaa8a');tl.textContent=d.l;svg.appendChild(tl);
      if(d.v){const tv=document.createElementNS('http://www.w3.org/2000/svg','text');tv.setAttribute('x',x+w/2);tv.setAttribute('y',h0-bh-2);tv.setAttribute('text-anchor','middle');tv.setAttribute('font-size','5.5');tv.setAttribute('fill',color);tv.textContent=d.v;svg.appendChild(tv);}
    });
    return svg;
  };

  const kCard=(title,inner)=>{

  // Pipeline

// MAIN RENDER
// ═══════════════════════════════════════════════
const _render = () => {
  const app=document.getElementById('app');
  // Remove all children except sheet container
  const sc=document.getElementById('sheet-container');
  app.innerHTML='';
  if(sc)app.appendChild(sc);

  const main=h('div',{style:{flex:'1',overflow:'hidden',display:'flex',flexDirection:'column'}});

  const screenMap={
    dash: renderDash,
    contacts: renderContacts,
    camps: renderCamps,
    cots: renderCots,
    kpi: renderKPI,
    cfg: renderConfig,
  };

  const fn=screenMap[state.tab];
  if(fn)fn(main);

  // Bottom nav
  const nav=h('nav',{class:'nav'});
  const bdg=overdueCount();
  TABS.forEach(t=>{
    const a=state.tab===t.id;
    const btn=h('button',{class:`nav-btn${a?' active':''}`,onClick:()=>{state.tab=t.id;render();}});
    const icoWrap=h('div',{class:'ico'});
    icoWrap.appendChild(document.createTextNode(t.icon));
    if(t.id==='dash'&&bdg>0){const b=h('span',{class:'badge'},String(bdg));icoWrap.appendChild(b);}
    btn.appendChild(icoWrap);
    btn.appendChild(h('span',{class:'lbl'},t.l));
    nav.appendChild(btn);
  });

  app.appendChild(main);
  app.appendChild(nav);

  // Restore sheets
  renderSheet();
};

const TABS=[
  {id:'dash',icon:'📊',l:'Inicio'},
  {id:'contacts',icon:'👥',l:'Contactos'},
  {id:'camps',icon:'📧',l:'Campañas'},
  {id:'cots',icon:'📋',l:'Cotizar'},
  {id:'kpi',icon:'📈',l:'KPI'},
  {id:'cfg',icon:'⚙️',l:'Config'},
];

// iOS install hint
window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone){
    setTimeout(()=>{
      const banner=h('div',{style:{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:'#ffffff',border:'2px solid #3da63d',borderRadius:'14px',padding:'12px 18px',fontSize:'13px',color:'#1a2e1a',zIndex:'500',whiteSpace:'nowrap',boxShadow:'0 4px 24px rgba(61,166,61,.2)',animation:'fadeIn .3s ease'}});
      banner.appendChild(document.createTextNode('Safari → Compartir ↑ → '));
      banner.appendChild(h('strong',{style:{color:'#2d862d'}},'Añadir a pantalla de inicio'));
      document.body.appendChild(banner);
      setTimeout(()=>{banner.style.opacity='0';banner.style.transition='opacity .5s';setTimeout(()=>banner.remove(),500);},7000);
    },3000);
  }
  render();

  // Background load from Sheets (non-blocking, after app is visible)
  setTimeout(async () => {
    try {
      const res = await Promise.race([
        fetch(SCRIPT_URL+'?t='+Date.now(),{redirect:'follow'}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
      ]);
      const json = await res.json();
      if(json.ok && json.data && json.data.contacts) {
        const d=json.data;
        let changed=false;
        if(d.contacts?.length){state.contacts=d.contacts;changed=true;}
        if(d.quotes?.length){state.quotes=d.quotes;changed=true;}
        if(d.camps?.length){state.camps=d.camps;changed=true;}
        if(d.elog){state.elog=d.elog;changed=true;}
        if(d.catalog?.length){state.catalog=d.catalog;changed=true;}
        if(d.settings){state.settings=d.settings;changed=true;}
        LC.set('move:cache',d);
        if(changed)render();
      }
    }catch(e){}
    // Auto refresh every 60s
    setInterval(async()=>{
      if(_saveT)return;
      try{
        const r=await fetch(SCRIPT_URL+'?t='+Date.now(),{redirect:'follow'});
        const j=await r.json();
        if(j.ok&&j.data?.at){
          const cached=LC.get('move:cache',null);
          if(!cached||j.data.at>(cached.at||'')){
            if(j.data.contacts)state.contacts=j.data.contacts;
            if(j.data.quotes)state.quotes=j.data.quotes;
            if(j.data.camps)state.camps=j.data.camps;
            if(j.data.elog)state.elog=j.data.elog;
            LC.set('move:cache',j.data);
            render();
          }
        }
      }catch(e){}
    },60000);
  }, 500);
});
